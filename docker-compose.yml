version: "3.9"

services:
  api:
    build:
      context: .
      target: api
    ports:
      - "8080:8080"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  ui:
    build:
      context: .
      target: ui
    ports:
      - "8501:8501"
    env_file:
      - .env
    depends_on:
      api:
        condition: service_healthy
    environment:
      - API_URL=http://api:8080

volumes:
  forecast_data:
